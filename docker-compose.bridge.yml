# Alternativa para entornos donde network_mode: host no está disponible.
# La alta manual por IP puede funcionar, pero WS-Discovery ONVIF multicast
# normalmente no atravesará la red bridge y el firewall FORWARD del host debe
# permitir el acceso hacia la subred de cámaras.
services:
  fragata:
    build:
      context: .
    container_name: fragata
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FRAGATA_LISTEN_HOST: ${FRAGATA_LISTEN_HOST:-0.0.0.0}
      FRAGATA_LISTEN_PORT: 8080
      FRAGATA_ALLOW_PUBLIC_CAMERAS: ${FRAGATA_ALLOW_PUBLIC_CAMERAS:-true}
      FRAGATA_DATA_DIR: /data
      FRAGATA_RECORDINGS_DIR: /data/recordings
      TZ: America/Mexico_City
    ports:
      - "8080:8080"
    volumes:
      - fragata_data:/data
    healthcheck:
      test: ["CMD", "/fragata", "-healthcheck", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  fragata_data:
