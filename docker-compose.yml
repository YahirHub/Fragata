services:
  fragata:
    build:
      context: .
      args:
        VERSION: ${FRAGATA_VERSION:-0.9.0}
    container_name: fragata
    restart: unless-stopped
    init: true
    network_mode: host
    user: "${FRAGATA_UID:-1000}:${FRAGATA_GID:-1000}"
    env_file:
      - .env
    environment:
      FRAGATA_LISTEN_HOST: ${FRAGATA_LISTEN_HOST:-0.0.0.0}
      FRAGATA_LISTEN_PORT: ${FRAGATA_LISTEN_PORT:-8080}
      FRAGATA_ADMIN_USER: ${FRAGATA_ADMIN_USER:?Define FRAGATA_ADMIN_USER en .env}
      FRAGATA_ADMIN_PASSWORD: ${FRAGATA_ADMIN_PASSWORD:?Define una contraseña de al menos 12 caracteres en .env}
      FRAGATA_ALLOW_PUBLIC_CAMERAS: ${FRAGATA_ALLOW_PUBLIC_CAMERAS:-true}
      FRAGATA_DATA_DIR: /data
      FRAGATA_RECORDINGS_DIR: /recordings
      FRAGATA_LOG_PATH: /data/logs.txt
      FRAGATA_MAX_TRANSCODES: ${FRAGATA_MAX_TRANSCODES:-2}
      TZ: ${TZ:-America/Mexico_City}
    volumes:
      - type: bind
        source: ${FRAGATA_HOST_DATA_DIR:-./data}
        target: /data
        bind:
          create_host_path: false
      - type: bind
        source: ${FRAGATA_HOST_RECORDINGS_DIR:-./recordings}
        target: /recordings
        bind:
          create_host_path: false
      - type: bind
        source: ./config
        target: /etc/fragata/config
        read_only: true
        bind:
          create_host_path: false
      # Para llaves SFTP, descomenta y configura FRAGATA_SFTP_PRIVATE_KEY.
      # - type: bind
      #   source: ./secrets
      #   target: /run/secrets/fragata
      #   read_only: true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "/usr/local/bin/fragata", "-healthcheck", "http://127.0.0.1:${FRAGATA_LISTEN_PORT:-8080}/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: local
      options:
        max-size: "5m"
        max-file: "2"
