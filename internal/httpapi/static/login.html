<!doctype html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#4e73df">
  <title>Acceder · Fragata</title>
  <script src="/static/theme.js?v=0.8.2"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/styles.css?v=0.8.2">
</head>
<body>
  <fragata-auth-layout>
    <div class="auth-card-heading">
      <span class="auth-lock"><i class="bi bi-shield-lock-fill"></i></span>
      <div><h1>Bienvenido</h1><p>Introduce tus credenciales para acceder al panel.</p></div>
    </div>
    <form id="loginForm" class="mt-4" novalidate>
      <div class="mb-3"><label class="form-label" for="loginUsername">Usuario</label><div class="input-group input-group-lg"><span class="input-group-text"><i class="bi bi-person"></i></span><input id="loginUsername" class="form-control" name="username" required autocomplete="username" autofocus></div></div>
      <div class="mb-3"><label class="form-label" for="loginPassword">Contraseña</label><div class="input-group input-group-lg"><span class="input-group-text"><i class="bi bi-key"></i></span><input id="loginPassword" class="form-control" name="password" type="password" required autocomplete="current-password"><button id="togglePassword" class="btn btn-outline-secondary" type="button" aria-label="Mostrar contraseña"><i class="bi bi-eye"></i></button></div></div>
      <button class="btn btn-primary btn-lg w-100 mt-2" type="submit"><span class="button-label"><i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión</span><span class="button-loading hidden"><span class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>Verificando…</span></button>
      <div id="loginStatus" class="alert alert-danger mt-3 mb-0 hidden" role="alert"></div>
    </form>
  </fragata-auth-layout>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="/static/layouts.js?v=0.8.2" defer></script>
  <script src="/static/login.js" defer></script>
</body>
</html>
