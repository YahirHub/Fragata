<!doctype html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#4e73df"><title>Servidores SFTP · Fragata</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/styles.css?v=0.7.1">
</head>
<body>
<fragata-app-layout page-title="Servidores SFTP" page-icon="bi-cloud-arrow-up-fill" active="sftp">
  <section class="page-heading mb-4"><div><span class="section-kicker">Configuración global</span><h2 class="mb-1">Servidores de respaldo</h2><p class="text-body-secondary mb-0">Crea perfiles reutilizables y asígnalos a cualquier cámara.</p></div><button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#sftpModal" id="newProfileButton"><i class="bi bi-plus-lg me-2"></i>Agregar servidor</button></section>
  <article class="card dashboard-card"><div class="table-responsive"><table class="table camera-table align-middle mb-0"><thead><tr><th>Nombre</th><th>Servidor</th><th>Usuario</th><th>Destino</th><th>Estado</th><th class="text-end">Acciones</th></tr></thead><tbody id="profilesTable"><tr><td colspan="6" class="text-center py-5 text-body-secondary">Cargando servidores…</td></tr></tbody></table></div></article>
</fragata-app-layout>
<div class="modal fade" id="sftpModal" tabindex="-1" aria-hidden="true"><div class="modal-dialog modal-lg modal-dialog-scrollable"><form id="sftpForm" class="modal-content"><div class="modal-header"><div><span class="section-kicker">Perfil global</span><h2 id="sftpModalTitle" class="modal-title h5">Agregar servidor SFTP</h2></div><button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button></div><div class="modal-body"><input id="profileID" type="hidden"><div class="row g-3">
<div class="col-md-8"><label class="form-label">Nombre</label><input id="profileName" class="form-control" maxlength="80" required placeholder="Servidor principal"></div><div class="col-md-4 d-flex align-items-end"><div class="form-check form-switch form-switch-lg mb-2"><input id="profileEnabled" class="form-check-input" type="checkbox" checked><label class="form-check-label" for="profileEnabled">Habilitado</label></div></div>
<div class="col-md-8"><label class="form-label">Host</label><input id="profileHost" class="form-control" required placeholder="ssh.example.com"></div><div class="col-md-4"><label class="form-label">Puerto</label><input id="profilePort" class="form-control" type="number" min="1" max="65535" value="22" required></div>
<div class="col-md-6"><label class="form-label">Usuario</label><input id="profileUser" class="form-control" required></div><div class="col-md-6"><label class="form-label">Contraseña</label><input id="profilePassword" class="form-control" type="password"><div id="passwordHelp" class="form-text">Obligatoria si no se usa llave privada.</div></div>
<div class="col-12"><label class="form-label">Ruta de llave privada <span class="text-body-secondary fw-normal">(opcional)</span></label><input id="profileKey" class="form-control font-monospace" placeholder="/home/fragata/.ssh/id_ed25519"></div>
<div class="col-12"><label class="form-label">Archivo known_hosts</label><input id="profileKnownHosts" class="form-control font-monospace" required placeholder="/home/fragata/.ssh/known_hosts"></div>
<div class="col-md-8"><label class="form-label">Directorio remoto</label><input id="profileRemote" class="form-control font-monospace" value="/fragata" required></div><div class="col-md-4"><label class="form-label">Timeout</label><div class="input-group"><input id="profileTimeout" class="form-control" type="number" min="5" max="300" value="30"><span class="input-group-text">s</span></div></div>
<div class="col-12"><div class="form-check form-switch"><input id="profileDeleteLocal" class="form-check-input" type="checkbox"><label class="form-check-label" for="profileDeleteLocal">Eliminar copia local después de verificar la subida</label></div></div>
</div></div><div class="modal-footer"><button type="button" class="btn btn-light border" data-bs-dismiss="modal">Cancelar</button><button id="saveProfileButton" type="submit" class="btn btn-primary"><i class="bi bi-check2-circle me-2"></i>Guardar servidor</button></div></form></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="/static/layouts.js?v=0.7.1" defer></script><script src="/static/core.js?v=0.7.1" defer></script><script src="/static/settings-sftp.js?v=0.7.1" defer></script>
</body></html>
